<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesklyCRM</title>
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- View: Login -->
    <main id="view-login" class="view active">
        <div class="glass-panel login-card">
            <div class="logo-area">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="brand-logo">
                    <path
                        d="M21 16V8C21 6.89543 20.1046 6 19 6H5C3.89543 6 3 6.89543 3 8V16C3 17.1046 3.89543 18 5 18H19C20.1046 18 21 17.1046 21 16Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M12 12H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <h2>Вход в DesklyCRM</h2>
                <p>Управляйте клиентами и заказами в пару кликов</p>
            </div>

            <form id="form-login">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="owner@example.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </main>

    <!-- View: Dashboard (Layout) -->
    <div id="view-dashboard" class="view">
        <!-- Mobile: Hamburger button -->
        <button class="hamburger-btn" id="btn-hamburger" aria-label="Меню">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <!-- Mobile: Sidebar backdrop -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar glass-panel" id="sidebar">
            <div class="brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="brand-logo">
                    <path
                        d="M21 16V8C21 6.89543 20.1046 6 19 6H5C3.89543 6 3 6.89543 3 8V16C3 17.1046 3.89543 18 5 18H19C20.1046 18 21 17.1046 21 16Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>DesklyCRM</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Дашборд
                </a>
                <a href="#" class="nav-item" data-target="clients">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Клиенты
                </a>
                <a href="#" class="nav-item" data-target="orders">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Заказы
                </a>
                <a href="#" class="nav-item" data-target="reminders">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                    Задачи
                </a>
                <a href="#" class="nav-item" data-target="activity">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                    Активность
                </a>
                <a href="#" class="nav-item" data-target="settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
                        </path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    Настройки
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="btn-theme">
                    <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <span id="theme-label">Тёмная тема</span>
                </button>
                <div class="user-info">
                    <span id="current-user-email" class="text-sm fw-600">user@example.com</span>
                    <span id="current-user-role" class="badge">admin</span>
                </div>
                <button id="btn-logout" class="btn btn-outline btn-sm w-100 mt-2">Выйти</button>
            </div>
        </aside>

        <main class="content-area">
            <!-- Header section (Dynamic title + actions) -->
            <header class="content-header">
                <div class="header-titles">
                    <h1 id="page-title">Загрузка...</h1>
                    <p id="page-subtitle" class="text-muted">Пожалуйста, подождите</p>
                </div>
                <div class="header-actions" id="page-actions">
                    <!-- Injected by JS -->
                </div>
            </header>

            <div class="scrollable-content">
                <!-- Dashboard Content Container -->
                <div id="dashboard-content" style="display: none; padding: 1.5rem;"></div>

                <!-- Data Table Container -->
                <div class="glass-panel table-container" id="table-container">
                    <div class="table-toolbar" id="table-toolbar">
                        <!-- Filters and Search -->
                    </div>
                    <table class="data-table" id="data-table">
                        <thead id="data-table-head">
                            <tr>
                                <th>Пусто</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>

                    <div class="empty-state" id="empty-state" style="display: none;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" class="text-muted mb-3">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                        </svg>
                        <h3 class="fw-600">Нет данных для отображения</h3>
                        <p class="text-muted">Попробуйте изменить параметры поиска или добавить новые записи.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-container">
        <div class="modal glass-panel" id="dynamic-modal">
            <!-- Content injected dynamically -->
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
