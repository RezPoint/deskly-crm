{% extends "layout.html" %}
{% set title = "Login -- DesklyCRM" %}

{% block content %}
<h1>Login</h1>

{% if error %}
  <p class="err">{{ error }}</p>
{% endif %}

<div class="card">
  <h3>Sign in</h3>
  <form method="post" action="/login" class="row">
    <input name="email" type="email" placeholder="Email" value="{{ email }}" required autofocus />
    <input name="password" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <p class="muted">If this is a fresh install, go to <a href="/setup">setup</a>.</p>
</div>
{% endblock %}
