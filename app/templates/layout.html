<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "DesklyCRM" }}</title>
  <style>
    body { font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial; max-width: 960px; margin: 20px auto; padding: 0 14px; }
    a { text-decoration: none; }
    nav a { margin-right: 12px; }
    .card { border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px; margin: 12px 0; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select, textarea, button { padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    button { cursor: pointer; }
    .err { color: #b00020; margin: 10px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
    .muted { color: #777; }
  </style>
</head>
<body>
  <nav>
    <a href="/ui/clients">Clients</a>
    <a href="/ui/orders">Orders</a>
    <a href="/docs">Swagger</a>
  </nav>

  {% if error %}
    <div class="err">{{ error }}</div>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
