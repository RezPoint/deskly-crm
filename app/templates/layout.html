<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "DesklyCRM" }}</title>
  <style>
    :root {
      --bg: #f8f6f1;
      --card: #ffffff;
      --ink: #222120;
      --muted: #6e6a64;
      --line: #e6e1d9;
      --accent: #2f6f5e;
      --accent-2: #e9f1ee;
      --danger: #b00020;
      --danger-bg: #fff2f3;
      --shadow: 0 8px 30px rgba(22, 18, 14, 0.08);
    }
    body {
      font-family: "IBM Plex Serif", "Georgia", serif;
      color: var(--ink);
      background: radial-gradient(1200px 600px at 20% -10%, #efe8da 0%, transparent 60%), var(--bg);
      max-width: 1020px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }
    a { text-decoration: none; color: var(--accent); }
    nav { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    nav a { padding: 6px 10px; border-radius: 999px; background: var(--accent-2); color: var(--accent); font-weight: 600; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin: 14px 0;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, select, textarea, button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      font-family: "Inter", system-ui, sans-serif;
    }
    button { cursor: pointer; background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .inline { display: inline; }
    .danger { color: var(--danger); border-color: #f2b5bd; background: var(--danger-bg); }
    .err { color: var(--danger); margin: 10px 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--line); }
    tbody tr:nth-child(even) { background: #fbfaf7; }
    tbody tr:hover { background: #f4f1ea; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #f2f0ea;
      color: #5a554f;
    }
    .pill.new { background: #f0f7ff; color: #2a5d9f; }
    .pill.in_progress { background: #fff4e6; color: #a45b00; }
    .pill.done { background: #e8f7ee; color: #2f6f5e; }
    .pill.canceled { background: #ffeef0; color: #b00020; }
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f2f0ea;
      color: #3f3b36;
      font-weight: 600;
      font-size: 12px;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <nav>
    <a href="/ui/clients">Clients</a>
    <a href="/ui/orders">Orders</a>
    <a href="/docs">Swagger</a>
  </nav>

  {% if error %}
    <div class="err">{{ error }}</div>
  {% endif %}

  {% block content %}{% endblock %}

  <script>
    document.addEventListener("submit", (event) => {
      const form = event.target;
      if (!(form instanceof HTMLFormElement)) return;
      const message = form.getAttribute("data-confirm");
      if (message && !window.confirm(message)) {
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
