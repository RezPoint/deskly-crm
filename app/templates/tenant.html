{% extends "layout.html" %}
{% set title = "Workspace -- DesklyCRM" %}

{% block content %}
<h1>Workspace</h1>

<div class="card">
  <div class="section-head">
    <h3>{{ tenant.name }}</h3>
  </div>
  <p class="muted">Slug: {{ tenant.slug }}</p>
  <p class="muted">Created: {{ tenant.created_at|dt }}</p>
</div>
{% endblock %}
