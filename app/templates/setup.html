{% extends "layout.html" %}
{% set title = "Setup -- DesklyCRM" %}

{% block content %}
<h1>Initial setup</h1>

{% if error %}
  <p class="err">{{ error }}</p>
{% endif %}

<div class="card">
  <h3>Create owner account</h3>
  <form method="post" action="/setup" class="row">
    <input name="email" type="email" placeholder="Email" value="{{ email }}" required autofocus />
    <input name="password" type="password" placeholder="Password (min 6 chars)" required />
    <button type="submit">Create</button>
  </form>
  <p class="muted">This is a one-time setup. You can add more users later.</p>
</div>
{% endblock %}
