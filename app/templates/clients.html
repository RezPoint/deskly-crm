{% extends "layout.html" %}
{% set title = "Clients -- DesklyCRM" %}

{% block content %}
<h1>Clients</h1>

<div class="card">
  <form method="get" action="/ui/clients" class="row">
    <input name="q" placeholder="Search name/phone/telegram" value="{{ q }}" />
    <button type="submit">Search</button>
    <a class="muted" href="/ui/clients">Reset</a>
  </form>
</div>

<div class="card">
  <h3>Add client</h3>
  <form method="post" action="/ui/clients" class="row">
    <input name="name" placeholder="Name *" required />
    <input name="phone" placeholder="Phone" />
    <input name="telegram" placeholder="Telegram" />
    <input name="notes" placeholder="Notes" />
    <button type="submit">Create</button>
  </form>
</div>

<div class="card">
  <h3>List</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Telegram</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody>
    {% for c in clients %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.phone or "" }}</td>
        <td>{{ c.telegram or "" }}</td>
        <td class="muted">{{ c.created_at }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
